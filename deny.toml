# cargo-deny configuration.
# CI runs `cargo deny check advisories bans sources` (license checking can be
# enabled once the allow-list below is validated against the full dep tree).

[advisories]
version = 2
# RustSec advisory DB. Fails on vulnerabilities; IDs below are consciously ignored.
ignore = [
  # bincode 1.x is unmaintained (RUSTSEC-2025-0141). PulseDB pins bincode 1.3 for
  # on-disk serialization; migrating to bincode 2.x is a tracked follow-up, not a
  # vulnerability. cargo-audit treats this as a warning; cargo-deny errors on it.
  "RUSTSEC-2025-0141",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
# Deny known-problematic crates here if needed, e.g. { name = "openssl-sys" }.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# License policy — documented but NOT yet enforced in CI (see header).
# Enable by adding `licenses` to the cargo-deny command once validated.
[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "AGPL-3.0",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
